<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Top 9 Manga Generator</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

</head>

<body>

<h1>Top 9 Manga Generator</h1>

<div class="searchBox">
<input id="searchInput" placeholder="만화 제목 검색">
<button onclick="searchBooks()">검색</button>
</div>

<div id="results" class="results"></div>

<h2>Your Top 9</h2>

<div id="grid" class="grid"></div>

<div class="controls">
<button onclick="saveImage()">Save Image</button>
<button onclick="shareURL()">Share URL</button>
<button onclick="clearGrid()">Reset</button>
</div>

<canvas id="canvas" width="900" height="900"></canvas>

<script src="script.js"></script>

</body>
</html>
